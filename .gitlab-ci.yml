variables:
  FF_NETWORK_PER_BUILD: "true"

stages:
  - download
  - build
  - manifest

.variants:
  py313: &py313
    BASE_IMAGE: "registry.gitlab.com/thelabnyc/python:3.13@sha256:d8204ca502a038fd474ba25718cb93510b15043d0a9d987b9813850929366447"
    MUTABLE_TAG_NAME: "3.13"
    IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}"
  py314: &py314
    BASE_IMAGE: "registry.gitlab.com/thelabnyc/python:3.14@sha256:423a0201e46bcdfa1cab79bb589e56c051c984508160b2ea78ea2de2e76eb4ae"
    MUTABLE_TAG_NAME: "3.14"
    IMMUTABLE_TAG_NAME: "3.14.${CI_PIPELINE_IID}"
  py313_node22: &py313_node22
    BASE_IMAGE: "registry.gitlab.com/thelabnyc/python:3.13-node22@sha256:559a8bbe1420ddfd74ee2c9e25f7249dfef28ef374aa3946e63588c99b7e5850"
    MUTABLE_TAG_NAME: "3.13-node22"
    IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}-node22"
  py313_node24: &py313_node24
    BASE_IMAGE: "registry.gitlab.com/thelabnyc/python:3.13-node24@sha256:254bf673e63d69d22d7ca905d66518b83fda00f2f26bfcee2e8f63ba1d23a1ad"
    MUTABLE_TAG_NAME: "3.13-node24"
    IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}-node24"
  py314_node24: &py314_node24
    BASE_IMAGE: "registry.gitlab.com/thelabnyc/python:3.14-node24@sha256:4214126ce570754054d3b123504650e379df210265e9a726994cdbdcf3299868"
    MUTABLE_TAG_NAME: "3.14-node24"
    IMMUTABLE_TAG_NAME: "3.14.${CI_PIPELINE_IID}-node24"

.base_job: &base_job
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        TAG_SUFFIX: "-mr${CI_MERGE_REQUEST_IID}"
    # No suffix for default branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_REF_PROTECTED == "true"
      variables:
        TAG_SUFFIX: ""

download_db:
  <<: *base_job
  stage: download
  image: ubuntu:latest@sha256:f3d28607ddd78734bb7f71f117f3c6706c666b8b76cbff7c9ff6e5718d46ff64
  tags:
    - thelab-arm64
  script:
    - apt-get update
    - apt-get install -y wget
    - mkdir -p ./data
    - wget "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country&license_key=$MAXMIND_LICENSE_KEY&suffix=tar.gz" -O "data/GeoLite2-Country.mmdb.tar.gz"
    - wget "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=$MAXMIND_LICENSE_KEY&suffix=tar.gz" -O "data/GeoLite2-City.mmdb.tar.gz"
  artifacts:
    paths:
      - data/*

build:
  <<: *base_job
  stage: build
  needs:
    - job: download_db
      artifacts: true
  tags:
    - $RUNNER_TAG
  script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
    - ./bin/build.sh
  parallel:
    matrix:
      - <<: *py313
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py313
        ARCH: arm64
        RUNNER_TAG: thelab-arm64
      - <<: *py314
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py314
        ARCH: arm64
        RUNNER_TAG: thelab-arm64
      - <<: *py313_node22
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py313_node22
        ARCH: arm64
        RUNNER_TAG: thelab-arm64
      - <<: *py313_node24
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py313_node24
        ARCH: arm64
        RUNNER_TAG: thelab-arm64
      - <<: *py314_node24
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py314_node24
        ARCH: arm64
        RUNNER_TAG: thelab-arm64

manifest:
  stage: manifest
  needs: [build]
  tags:
    - thelab-arm64
  image: docker:latest@sha256:ad68e89b675740867a3bb96488a93fea9209ad36c6305bfba2664912d6dcf11a
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_REF_PROTECTED == "true"
  script:
    - apk add bash
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
    - ./bin/push-manifest.sh
  parallel:
    matrix:
      - <<: *py313
      - <<: *py314
      - <<: *py313_node22
      - <<: *py313_node24
      - <<: *py314_node24
