variables:
  FF_NETWORK_PER_BUILD: "true"

stages:
  - download
  - build
  - manifest

.variants:
  py313: &py313
    BASE_IMAGE: "registry.gitlab.com/thelabnyc/python:3.13@sha256:583057f4009d5dd02d7cdbcd4d9f74006cbe0d75ad7812a2ed9a3cd60c78e9d1"
    MUTABLE_TAG_NAME: "3.13"
    IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}"
  py314: &py314
    BASE_IMAGE: "registry.gitlab.com/thelabnyc/python:3.14@sha256:02179604a284d1843f76e4c9994e2bbeef8c9e60c6807cd8f4616b1b7f186e36"
    MUTABLE_TAG_NAME: "3.14"
    IMMUTABLE_TAG_NAME: "3.14.${CI_PIPELINE_IID}"
  py313_node22: &py313_node22
    BASE_IMAGE: "registry.gitlab.com/thelabnyc/python:3.13-node22@sha256:65c8046acab510375e3609c634109483bd9018c296f73c01cc3e310e7b6edd1a"
    MUTABLE_TAG_NAME: "3.13-node22"
    IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}-node22"
  py313_node24: &py313_node24
    BASE_IMAGE: "registry.gitlab.com/thelabnyc/python:3.13-node24@sha256:26fb912f379a7ba3d754bef5cf97526f04a00b8686bc3bed4334dd83cf1498d2"
    MUTABLE_TAG_NAME: "3.13-node24"
    IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}-node24"
  py314_node24: &py314_node24
    BASE_IMAGE: "registry.gitlab.com/thelabnyc/python:3.14-node24@sha256:1230433a540716a339dc93d0ae4009fea87c768af4a5c27b5966f13089032f70"
    MUTABLE_TAG_NAME: "3.14-node24"
    IMMUTABLE_TAG_NAME: "3.14.${CI_PIPELINE_IID}-node24"

.base_job: &base_job
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        TAG_SUFFIX: "-mr${CI_MERGE_REQUEST_IID}"
    # No suffix for default branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_REF_PROTECTED == "true"
      variables:
        TAG_SUFFIX: ""

download_db:
  <<: *base_job
  stage: download
  image: ubuntu:latest@sha256:186072bba1b2f436cbb91ef2567abca677337cfc786c86e107d25b7072feef0c
  tags:
    - thelab-arm64
  script:
    - apt-get update
    - apt-get install -y wget
    - mkdir -p ./data
    - wget "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country&license_key=$MAXMIND_LICENSE_KEY&suffix=tar.gz" -O "data/GeoLite2-Country.mmdb.tar.gz"
    - wget "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=$MAXMIND_LICENSE_KEY&suffix=tar.gz" -O "data/GeoLite2-City.mmdb.tar.gz"
  artifacts:
    paths:
      - data/*

build:
  <<: *base_job
  stage: build
  needs:
    - job: download_db
      artifacts: true
  tags:
    - $RUNNER_TAG
  script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
    - ./bin/build.sh
  parallel:
    matrix:
      - <<: *py313
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py313
        ARCH: arm64
        RUNNER_TAG: thelab-arm64
      - <<: *py314
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py314
        ARCH: arm64
        RUNNER_TAG: thelab-arm64
      - <<: *py313_node22
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py313_node22
        ARCH: arm64
        RUNNER_TAG: thelab-arm64
      - <<: *py313_node24
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py313_node24
        ARCH: arm64
        RUNNER_TAG: thelab-arm64
      - <<: *py314_node24
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py314_node24
        ARCH: arm64
        RUNNER_TAG: thelab-arm64

manifest:
  stage: manifest
  needs: [build]
  tags:
    - thelab-arm64
  image: docker:latest@sha256:4d90f1f6c400315c2dba96d3ec93c01e64198395cbba04f79d12adce4f737029
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_REF_PROTECTED == "true"
  script:
    - apk add bash
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
    - ./bin/push-manifest.sh
  parallel:
    matrix:
      - <<: *py313
      - <<: *py314
      - <<: *py313_node22
      - <<: *py313_node24
      - <<: *py314_node24
